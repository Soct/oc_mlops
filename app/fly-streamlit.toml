# fly-streamlit.toml — Dashboard Streamlit Home Credit
# Deployer depuis le dossier app/ :
#   fly deploy --config fly-streamlit.toml

app            = "homecredit-streamlit"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile.streamlit.fly"

[env]
  # Reseau prive Fly.io : homecredit-api.internal resout vers l'IP privee de l'API
  API_URL  = "http://homecredit-api.internal:8000"
  DATA_DIR = "/app/data"

[http_service]
  internal_port        = 8501
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
