# fly-api.toml — API FastAPI Home Credit
# Deployer depuis le dossier app/ :
#   fly deploy --config fly-api.toml

app            = "homecredit-api"
primary_region = "cdg"            # Paris Charles de Gaulle

[build]
  dockerfile = "Dockerfile.api.fly"

[env]
  MODELS_DIR = "/app/models"
  LOGS_DIR   = "/app/logs"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = "stop"   # scale to zero apres inactivite
  auto_start_machines  = true
  min_machines_running = 0        # 0 = scale to zero (free tier)

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  size   = "shared-cpu-1x"   # free tier (256 MB RAM)
  memory = "256mb"

# Volume pour la persistance des logs de predictions
[[mounts]]
  source      = "homecredit_logs"
  destination = "/app/logs"
  initial_size = "1gb"
