name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[test]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=app --cov=tests --cov-report=term-missing

      - name: Build Docker image (deploy check)
        run: |
          docker build -t homecredit-api:ci -f app/api/Dockerfile app/api
